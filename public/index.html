<!DOCTYPE html>
<html>
<head>
  <title>Lavanderia</title>
  <style>


    #topo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #333;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }

    #topo button {
      width: 45%;
      padding: 10px;
      font-size: 16px;
      background: #555;
      color: white;
    }

    body {
      font-family: Arial;
      text-align: center;
      margin-top: 120px;
    }

    button {
      display: block;
      width: 80%;
      margin: 15px auto;
      padding: 18px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .depositar { background:#3498db; color:white; }
    .retirar { background:#2ecc71; color:white; }

    .box { color:white; font-weight:bold; }

    .box:disabled {
      background:#bdc3c7 !important;
      opacity:0.7;
    }

    .modal {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .btn-confirmar {
      background: #2ecc71;
      color: white;
    }

    .btn-cancelar {
      background: #e74c3c;
      color: white;
    }
    .indisponivel {
      background: #bdc3c7;
      color: #666;
      cursor: not-allowed;
    }
    .modal-content input {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    .modal-content {
      display: flex;
      flex-direction: column;
      background:white;
      padding:20px;
      border-radius:10px;
      width:80%;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div id="topo">
  <button onclick="irHome()">🏠 Home</button>
  <button onclick="voltar()">⬅ Voltar</button>
</div>

<h1>Lavanderia</h1>

<div id="menu">
  <button class="depositar" onclick="abrir('depositar')">Depositar</button>
  <button class="retirar" onclick="abrir('retirar')">Retirar</button>
</div>

<div id="tela" style="display:none;">
  <h2 id="titulo"></h2>
  <div id="lista"></div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitulo"></h2>

    <input id="nome" placeholder="Nome" type="text">
    <input id="telefone" placeholder="Telefone" type="tel">
    <input id="codigo" placeholder="Últimos 4 dígitos" type="number">

    <button class="btn-confirmar" onclick="confirmar()">Confirmar</button>
    <button class="btn-cancelar" onclick="fechar()">Cancelar</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
